<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="fg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#bfdbfe"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Ψ (Psi) — vertical stem -->
  <rect x="29" y="34" width="6" height="18" rx="2" fill="url(#fg)"/>
  <!-- Left arm -->
  <path d="M16 18 Q16 36 26 38" stroke="url(#fg)" stroke-width="5.5" fill="none" stroke-linecap="round"/>
  <!-- Right arm -->
  <path d="M48 18 Q48 36 38 38" stroke="url(#fg)" stroke-width="5.5" fill="none" stroke-linecap="round"/>
  <!-- Top crossbar -->
  <rect x="13" y="15" width="38" height="5.5" rx="2.75" fill="url(#fg)"/>
</svg>
